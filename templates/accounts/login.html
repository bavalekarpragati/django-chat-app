<!DOCTYPE html>
<html>
<head>
    <title>Login - Chat App</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-purple-600 to-blue-500 h-screen">
    <div class="flex items-center justify-center h-full">
        <div class="bg-white rounded-lg shadow-xl p-8 w-96">
            <h1 class="text-2xl font-bold text-center mb-6">Login to Chat</h1>
            
            <div id="error-message" class="hidden bg-red-100 text-red-700 p-3 rounded mb-4"></div>
            
            <form id="login-form">
                <div class="mb-4">
                    <label class="block text-gray-700 mb-2">Username</label>
                    <input type="text" id="username" class="w-full border border-gray-300 rounded-lg px-4 py-2" required>
                </div>
                
                <div class="mb-6">
                    <label class="block text-gray-700 mb-2">Password</label>
                    <input type="password" id="password" class="w-full border border-gray-300 rounded-lg px-4 py-2" required>
                </div>
                
                <button type="submit" class="w-full bg-purple-600 text-white rounded-lg py-2 hover:bg-purple-700 transition">
                    Login
                </button>
            </form>
            
            <p class="text-center text-gray-600 mt-4">
                Don't have an account? <a href="/register/" class="text-purple-600 hover:underline">Register</a>
            </p>
        </div>
    </div>
    
    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            const errorDiv = document.getElementById('error-message');
            errorDiv.classList.add('hidden');
            
            try {
                const response = await fetch('/api/auth/login/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    // Store tokens and username
                    localStorage.setItem('access_token', data.access);
                    localStorage.setItem('refresh_token', data.refresh);
                    localStorage.setItem('chat_username', data.user.username);
                    localStorage.setItem('user_id', data.user.id);
                    
                    // Redirect to chat
                    window.location.href = '/';
                } else {
                    errorDiv.textContent = data.error || 'Invalid username or password';
                    errorDiv.classList.remove('hidden');
                }
            } catch (error) {
                console.error('Error:', error);
                errorDiv.textContent = 'Network error. Please try again.';
                errorDiv.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
