<!DOCTYPE html>
<html>
<head>
    <title>Register - Chat App</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-purple-600 to-blue-500 h-screen">
    <div class="flex items-center justify-center h-full">
        <div class="bg-white rounded-lg shadow-xl p-8 w-96">
            <h1 class="text-2xl font-bold text-center mb-6">Create Account</h1>
            
            <div id="error-message" class="hidden bg-red-100 text-red-700 p-3 rounded mb-4"></div>
            <div id="success-message" class="hidden bg-green-100 text-green-700 p-3 rounded mb-4"></div>
            
            <form id="register-form">
                <div class="mb-4">
                    <label class="block text-gray-700 mb-2">Username</label>
                    <input type="text" id="username" class="w-full border border-gray-300 rounded-lg px-4 py-2" required>
                </div>
                
                <div class="mb-4">
                    <label class="block text-gray-700 mb-2">Email (optional)</label>
                    <input type="email" id="email" class="w-full border border-gray-300 rounded-lg px-4 py-2">
                </div>
                
                <div class="mb-4">
                    <label class="block text-gray-700 mb-2">Password</label>
                    <input type="password" id="password" class="w-full border border-gray-300 rounded-lg px-4 py-2" required>
                </div>
                
                <div class="mb-6">
                    <label class="block text-gray-700 mb-2">Confirm Password</label>
                    <input type="password" id="password2" class="w-full border border-gray-300 rounded-lg px-4 py-2" required>
                </div>
                
                <button type="submit" class="w-full bg-green-500 text-white rounded-lg py-2 hover:bg-green-600 transition">
                    Register
                </button>
            </form>
            
            <p class="text-center text-gray-600 mt-4">
                Already have an account? <a href="/login/" class="text-purple-600 hover:underline">Login</a>
            </p>
        </div>
    </div>
    
    <script>
        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const password2 = document.getElementById('password2').value;
            
            const errorDiv = document.getElementById('error-message');
            const successDiv = document.getElementById('success-message');
            errorDiv.classList.add('hidden');
            successDiv.classList.add('hidden');
            
            if (password !== password2) {
                errorDiv.textContent = 'Passwords do not match';
                errorDiv.classList.remove('hidden');
                return;
            }
            
            try {
                const response = await fetch('/api/auth/register/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, email, password, password2 })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    successDiv.textContent = 'Registration successful! Redirecting to login...';
                    successDiv.classList.remove('hidden');
                    setTimeout(() => {
                        window.location.href = '/login/';
                    }, 2000);
                } else {
                    let errorMsg = 'Registration failed';
                    if (data.username) errorMsg = data.username.join(', ');
                    else if (data.error) errorMsg = data.error;
                    errorDiv.textContent = errorMsg;
                    errorDiv.classList.remove('hidden');
                }
            } catch (error) {
                console.error('Error:', error);
                errorDiv.textContent = 'Network error. Please try again.';
                errorDiv.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
