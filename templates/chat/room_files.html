<!DOCTYPE html>
<html>
<head>
    <title>Chat with File Sharing</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); height: 100vh; }
        .chat-container { max-width: 800px; margin: 0 auto; background: white; height: 100vh; display: flex; flex-direction: column; }
        .header { background: #4a5568; color: white; padding: 15px; }
        .messages { flex: 1; overflow-y: auto; padding: 20px; }
        .message { margin-bottom: 15px; padding: 10px; border-radius: 10px; max-width: 70%; }
        .message-mine { background: #667eea; color: white; margin-left: auto; }
        .message-other { background: #e2e8f0; margin-right: auto; }
        .username { font-weight: bold; font-size: 12px; margin-bottom: 5px; }
        .timestamp { font-size: 10px; opacity: 0.7; margin-top: 5px; }
        .input-area { display: flex; padding: 15px; border-top: 1px solid #ddd; gap: 10px; }
        .input-area input { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 5px; }
        .input-area button { padding: 10px 20px; background: #667eea; color: white; border: none; border-radius: 5px; cursor: pointer; }
        .file-preview { max-width: 200px; max-height: 200px; margin-top: 10px; }
        .file-btn { background: #48bb78; }
        .system { text-align: center; color: #718096; font-style: italic; margin: 10px 0; }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="header">
            <h2>💬 Chat Room: {{ room_name }}</h2>
            <div>Logged in as: <span id="current-user"></span></div>
        </div>
        
        <div id="messages" class="messages"></div>
        
        <div class="input-area">
            <input type="file" id="file-input" style="display: none;">
            <button id="file-btn" class="file-btn">📎 Attach File</button>
            <input type="text" id="message-input" placeholder="Type your message...">
            <button id="send-btn">Send</button>
        </div>
    </div>

    <script>
        const roomName = "{{ room_name }}";
        let username = localStorage.getItem('chat_username') || prompt('Enter username:');
        localStorage.setItem('chat_username', username);
        document.getElementById('current-user').innerText = username;
        
        // WebSocket connection
        const wsUrl = `ws://${window.location.host}/ws/chat/${roomName}/`;
        const socket = new WebSocket(wsUrl);
        
        socket.onopen = () => console.log('Connected');
        socket.onmessage = (e) => {
            const data = JSON.parse(e.data);
            if (data.type === 'message') {
                addMessage(data.username, data.message, data.timestamp);
            } else if (data.type === 'file') {
                addFileMessage(data.username, data.message, data.file_url, data.file_type, data.timestamp);
            } else if (data.type === 'system') {
                addSystemMessage(data.message);
            }
        };
        
        function addMessage(msgUser, msg, time) {
            const messagesDiv = document.getElementById('messages');
            const isMine = msgUser === username;
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${isMine ? 'message-mine' : 'message-other'}`;
            msgDiv.innerHTML = `
                <div class="username">${escapeHtml(msgUser)}</div>
                <div>${escapeHtml(msg)}</div>
                <div class="timestamp">${new Date(time).toLocaleTimeString()}</div>
            `;
            messagesDiv.appendChild(msgDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }
        
        function addFileMessage(msgUser, msg, fileUrl, fileType, time) {
            const messagesDiv = document.getElementById('messages');
            const isMine = msgUser === username;
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${isMine ? 'message-mine' : 'message-other'}`;
            
            let content = '';
            if (fileType === 'image') {
                content = `<img src="${fileUrl}" class="file-preview">`;
            } else if (fileType === 'video') {
                content = `<video src="${fileUrl}" controls class="file-preview"></video>`;
            } else {
                content = `<a href="${fileUrl}" target="_blank">📎 Download ${msg}</a>`;
            }
            
            msgDiv.innerHTML = `
                <div class="username">${escapeHtml(msgUser)}</div>
                <div>${escapeHtml(msg)}</div>
                ${content}
                <div class="timestamp">${new Date(time).toLocaleTimeString()}</div>
            `;
            messagesDiv.appendChild(msgDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }
        
        function addSystemMessage(msg) {
            const messagesDiv = document.getElementById('messages');
            const sysDiv = document.createElement('div');
            sysDiv.className = 'system';
            sysDiv.innerText = msg;
            messagesDiv.appendChild(sysDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }
        
        function sendMessage() {
            const input = document.getElementById('message-input');
            const message = input.value.trim();
            if (message) {
                socket.send(JSON.stringify({
                    'type': 'message',
                    'message': message,
                    'username': username
                }));
                input.value = '';
            }
        }
        
        // File upload
        const fileInput = document.getElementById('file-input');
        const fileBtn = document.getElementById('file-btn');
        const token = localStorage.getItem('access_token');
        
        fileBtn.onclick = () => fileInput.click();
        
        fileInput.onchange = async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            
            const formData = new FormData();
            formData.append('file', file);
            
            addSystemMessage(`Uploading ${file.name}...`);
            
            try {
                const response = await fetch('/api/upload/', {
                    method: 'POST',
                    headers: token ? { 'Authorization': `Bearer ${token}` } : {},
                    body: formData
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    socket.send(JSON.stringify({
                        'type': data.file_type,
                        'file_url': data.file_url,
                        'file_name': data.file_name,
                        'file_type': data.file_type,
                        'file_size': data.file_size,
                        'username': username
                    }));
                } else {
                    alert('Upload failed: ' + data.error);
                }
            } catch (error) {
                console.error('Upload error:', error);
                alert('Upload failed');
            }
            
            fileInput.value = '';
        };
        
        document.getElementById('send-btn').onclick = sendMessage;
        document.getElementById('message-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
